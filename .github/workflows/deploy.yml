name: 🚀 Deploy ACIP Portal → cPanel FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy vía FTP
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 📦 Preparar public_html (estructura plana)
        run: |
          set -e
          rm -rf deploy
          mkdir -p deploy

          cp -r app config includes deploy/
          mkdir -p deploy/storage/{cache,logs,sessions,uploads}
          cp -r public/. deploy/
          cp public/.htaccess.production deploy/.htaccess
          sed -i "s/define('BASE_PATH', dirname(__DIR__));/define('BASE_PATH', __DIR__);/" deploy/index.php
          rm -f deploy/test_deploy.php deploy/info.php deploy/fix_reclamaciones_db.php deploy/test_doc.txt

      - name: 📤 Subir a public_html
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          server-dir: public_html/
          local-dir: ./deploy/
          timeout: 600000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store
            **/.env
            **/storage/logs/**
          dangerous-clean-slate: false

      - name: ✅ Despliegue completado
        if: success()
        run: |
          echo "✅ Portal ACIP desplegado en public_html"
          echo "🌐 URL: https://www.iespacip.edu.pe"

      - name: ❌ Falló el despliegue
        if: failure()
        run: echo "❌ El despliegue falló. Revisa los logs."
