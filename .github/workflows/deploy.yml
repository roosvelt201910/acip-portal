name: 🚀 Deploy ACIP Portal → cPanel FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy vía FTP
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 📦 Preparar producción
        run: |
          mkdir -p storage/{cache,logs,sessions,uploads}
          cp public/.htaccess.production public/.htaccess

      - name: 📤 Subir archivos al servidor (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          server-dir: iespacip.edu.pe/
          local-dir: ./
          timeout: 600000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store
            **/ftp_upload.py
            **/.env
            **/storage/logs/**
            **/deploy/**
            **/scripts/wipe_ftp_dir.py
          dangerous-clean-slate: false

      - name: ✅ Despliegue completado
        if: success()
        run: |
          echo "✅ Portal ACIP desplegado exitosamente"
          echo "🌐 URL: https://www.iespacip.edu.pe"

      - name: ❌ Falló el despliegue
        if: failure()
        run: echo "❌ El despliegue falló. Revisa los logs."
